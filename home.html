<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>Open Modam — App Link</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --gold: #C8A96E;
      --bg: #010204;
      --card: #0B0F1A;
      --border: #1A2235;
      --text: #E5E7EB;
      --muted: #6B7280;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }
    #card {
      width: 100%;
      max-width: 420px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      overflow: hidden;
      padding: 28px 24px 24px;
    }
    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 28px;
      font-weight: 300;
      margin-bottom: 10px;
      text-align: center;
    }
    p.lead {
      font-size: 14px;
      color: var(--muted);
      text-align: center;
      line-height: 1.6;
      margin-bottom: 24px;
    }
    .btn-open {
      display: block;
      width: 100%;
      text-align: center;
      padding: 14px 20px;
      background: linear-gradient(135deg, var(--gold) 0%, #B8924A 100%);
      color: #0a0a0a;
      font-size: 15px;
      font-weight: 600;
      text-decoration: none;
      border-radius: 12px;
      margin-bottom: 20px;
    }
    .btn-open:hover { opacity: 0.95; }
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }
    .divider-line { flex: 1; height: 1px; background: var(--border); }
    .divider-text { font-size: 12px; color: var(--muted); }
    .store-buttons { display: flex; gap: 10px; }
    .btn-store {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 13px;
      font-weight: 500;
      text-decoration: none;
    }
    .btn-store:hover { border-color: var(--gold); background: rgba(200,169,110,0.06); }
    .back {
      display: block;
      text-align: center;
      margin-top: 20px;
      color: var(--gold);
      font-size: 14px;
      text-decoration: none;
    }
    .logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 13px;
      font-weight: 300;
      letter-spacing: 6px;
      color: var(--muted);
      text-transform: uppercase;
      text-align: center;
      margin-top: 28px;
    }
  </style>
</head>
<body>
  <div id="card">
    <h1>Modam App</h1>
    <p class="lead">Tap below to open MODAM. If you don't have the app yet, download it from the store.</p>
    <a class="btn-open" id="btnOpenApp" href="#">Open App</a>
    <div class="divider">
      <div class="divider-line"></div>
      <span class="divider-text">Download</span>
      <div class="divider-line"></div>
    </div>
    <div class="store-buttons">
      <a class="btn-store" href="https://apps.apple.com/app/id6753962694" target="_blank" rel="noopener noreferrer">
        App Store
      </a>
      <a class="btn-store" href="https://play.google.com/store/apps/details?id=com.artyard.app" target="_blank" rel="noopener noreferrer">
        Google Play
      </a>
    </div>
    <div style="margin-top: 40px;">
      <a class="back" href="index.html">← Back to website</a>
    </div>
  </div>
  <p class="logo">Modam</p>

<script>
  const APP_SCHEME = 'artyard';
  const DEEP_HOME = `${APP_SCHEME}://home`;

  function tryOpenApp() {
    const iframe = document.createElement('iframe');
    iframe.style.display = 'none';
    iframe.src = DEEP_HOME;
    document.body.appendChild(iframe);
    setTimeout(() => {
      try { document.body.removeChild(iframe); } catch (e) {}
    }, 2000);
  }

  document.getElementById('btnOpenApp').href = DEEP_HOME;
  tryOpenApp();
</script>
</body>
</html>
